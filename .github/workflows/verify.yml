# Reproduce the formal analysis on every push / PR.
#
# Practicing what the paper preaches:
#   * permissions are least-privilege (read-only GITHUB_TOKEN), the Layer 1
#     finding's recommendation for CI workflows;
#   * every action is pinned to a full commit SHA (not a floating tag) -- the
#     exact mitigation this project's central finding recommends. The trailing
#     `# vX.Y.Z` comment records the human-readable version each SHA resolves to.
#
# Layer 1 (Python) runs on Linux; Layer 2 (TLA+/TLC, bundled JAR) runs on
# Windows via the project's PowerShell driver. Layer 3 (PRISM) also runs on
# Windows, driving a native DLL + the Git-for-Windows MinGW runtime -- verified
# working on windows-latest, so it is a required gate alongside Layers 1 and 2.

name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  layer1-corpus:
    name: Layer 1 - corpus analyzer (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Unit tests (extractor correctness on synthetic fixtures)
        working-directory: TrivySupplyChain/layer1
        run: python test_corpus_analysis.py
      - name: Analyze the committed 189-workflow corpus
        working-directory: TrivySupplyChain/layer1
        run: python corpus_analysis.py corpus --json results/corpus_report.json --md results/corpus_report.md

  layer2-tlc:
    name: Layer 2 - TLA+/TLC incident reconstruction
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a  # v5.5.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Run the 10-configuration TLC validation suite
        shell: pwsh
        working-directory: TrivySupplyChain
        run: ./run-all.ps1

  layer3-prism:
    name: Layer 3 - PRISM quantitative model
    runs-on: windows-latest
    # Required gate: PRISM's native prism.dll (CUDD) runs on windows-latest using
    # the Git-for-Windows MinGW runtime DLLs (verified green in CI).
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a  # v5.5.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Run the PRISM quantitative suite
        shell: pwsh
        working-directory: TrivySupplyChain/layer3
        run: ./run-layer3.ps1
