\* ISOLATION proof.  A MIXED population: v1 and v2 pin by SHA; v3, v4, v5 use
\* floating tags; the residual credential is still valid (attacker active).
\* Expected: Isolation HOLDS -- no SHA-pinned victim's secret is ever exfiltrated,
\* even though the attack succeeds against the tag-pinned victims in the same run.
SPECIFICATION Spec
CONSTANTS
    Victims = {v1, v2, v3, v4, v5}
    Repos = {trivy_action, setup_trivy}
    Tags = {tg1, tg2, tg3, tg4, tg5}
    Commits = {c_benign, c_malicious, c_other}
    BenignCommit = c_benign
    MaliciousCommit = c_malicious
    AquaServiceAcct = AquaServiceAcct
    ShaPinnedVictims = {v1, v2}
    ServiceAcctRotated = FALSE
INVARIANT TypeOK
INVARIANT Isolation
