\* NON-VACUITY / CONTAINMENT witness for the isolation proof.  Same mixed
\* population as cfg_mixed.  Checking NoUnpinnedCompromise is EXPECTED TO FAIL:
\* TLC returns a counterexample that compromises an unpinned victim (e.g. v3)
\* while leaving the SHA-pinned v1/v2 untouched -- i.e. the breach is real
\* but contained to the unpinned subset.
SPECIFICATION Spec
CONSTANTS
    Victims = {v1, v2, v3, v4, v5}
    Repos = {trivy_action, setup_trivy}
    Tags = {tg1, tg2, tg3, tg4, tg5}
    Commits = {c_benign, c_malicious, c_other}
    BenignCommit = c_benign
    MaliciousCommit = c_malicious
    AquaServiceAcct = AquaServiceAcct
    ShaPinnedVictims = {v1, v2}
    ServiceAcctRotated = FALSE
INVARIANT TypeOK
INVARIANT NoUnpinnedCompromise
