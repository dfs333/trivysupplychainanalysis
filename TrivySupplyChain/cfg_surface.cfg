\* RESIDUAL ATTACK SURFACE quantification (vulnerable config, all tags).
\* NotFullSurface is EXPECTED TO FAIL: TLC's counterexample reaches a state where
\* attackerKnowledge = Victims \ ShaPinnedVictims = all 5 victims, witnessing that
\* the full residual surface (here, every victim) is reachable.  Growing
\* ShaPinnedVictims shrinks this surface monotonically to the empty set.
SPECIFICATION Spec
CONSTANTS
    Victims = {v1, v2, v3, v4, v5}
    Repos = {trivy_action, setup_trivy}
    Tags = {tg1, tg2, tg3, tg4, tg5}
    Commits = {c_benign, c_malicious, c_other}
    BenignCommit = c_benign
    MaliciousCommit = c_malicious
    AquaServiceAcct = AquaServiceAcct
    ShaPinnedVictims = {}
    ServiceAcctRotated = FALSE
INVARIANT NotFullSurface
