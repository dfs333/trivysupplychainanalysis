\* TLC configuration for TrivyCompromise.tla
\* Run with: tlc2 -config trivy-compromise.cfg trivy-compromise.tla
\*
\* This is the *vulnerable baseline* configuration. It should produce a
\* counterexample to NoExfiltration, and that counterexample should match
\* the documented March 19 attack trace.
\*
\* Other configurations to run (in separate .cfg files or by overriding):
\*   - vulnerable-baseline  (this file)
\*   - rotated-completely   (all creds rotated; NoExfiltration should hold)
\*   - all-sha-pinned       (all victims SHA-pinned; NoExfiltration should hold)
\*   - both-mitigations     (defense in depth; NoExfiltration should hold)

CONSTANTS
    Maintainers = {AquaServiceAcct, AquaHuman1, AquaHuman2}
    Victims = {Mercor, VictimA, VictimB}
    Actions = {TrivyAction, SetupTrivy}
    Tags = {V0_28, V0_29, V0_30}
    Commits = {Benign, Malicious}
    Secrets = {SecM1, SecM2, SecA1, SecA2, SecB1, SecB2}
    BenignCommit = Benign
    MaliciousCommit = Malicious
    ServiceAcct = AquaServiceAcct

SPECIFICATION Spec

INVARIANT
    TypeOK
    NoExfiltration

\* Expected TLC behavior on vulnerable baseline:
\*   NoExfiltration will be VIOLATED.
\*   The counterexample trace should contain (in order):
\*     1. Init state: attacker holds AquaServiceAcct (valid)
\*     2. ForcePushTag(some action, some tag, Malicious)
\*     3. RunnerExecute(some victim, that action, that tag)
\*     4. attackerKnowledge becomes non-empty
\*   Compare this trace to dossiers/trivy-teampcp.md attack-trace table.
